{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Pay for Order {{ order.order_id }}</h2>
    <p>Total: {{ order.total_amount }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Pay Now</button>
    </form>
    <p>
        <a href="{% url 'order_details' order.order_id %}">Back to Order</a>
        {% if user.is_authenticated %} | <a href="{% url 'profile' %}">Back to Profile</a>{% endif %}
    </p>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>📷 Upload Image for {{ restaurant.name }}</h2>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label for="image">Choose an image file:</label>
                    <input type="file" name="image" accept="image/*" required>
                    <small style="color:#666;margin-top:0.5rem;display:block;">Supported formats: JPG, PNG, GIF. Max size: 5MB</small>
                </div>
                <button type="submit" class="btn btn-primary">📤 Upload Image</button>
            </form>
            <div style="margin-top:2rem;">
                <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-outline">← Back to Restaurant</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

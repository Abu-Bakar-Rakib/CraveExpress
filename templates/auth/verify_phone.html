{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h2>Verify Phone</h2>
  <p>Enter the 6-digit code sent to your phone.</p>
  <form method="post">
    {% csrf_token %}
    <input type="text" name="code" placeholder="123456" maxlength="6" required>
    <button type="submit">Verify</button>
  </form>
  <p><a href="{% url 'request_phone_otp' %}">Resend code</a></p>
</div>
{% endblock %}
